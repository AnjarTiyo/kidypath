version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ansara-jurnal-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
    volumes:
      - .:/app:cached
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - db
    command: bun run dev --hostname 0.0.0.0 --port 3000
    restart: unless-stopped

  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Uncomment and configure when you need object storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  db_data:
  minio_data: