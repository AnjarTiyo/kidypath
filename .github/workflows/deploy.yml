name: CI/CD

on:
  push:
    branches:
      - master

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: echo "No tests configured yet — replace this step with your test command"

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    outputs:
      owner: ${{ steps.owner.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/kidypath:latest
            ghcr.io/${{ steps.owner.outputs.name }}/kidypath:${{ github.sha }}
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}
            MINIO_BUCKET_NAME=${{ secrets.MINIO_BUCKET_NAME }}
            MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            MINIO_PUBLIC_URL=${{ secrets.MINIO_PUBLIC_URL }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.owner.outputs.name }}/kidypath:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.owner.outputs.name }}/kidypath:buildcache,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_PAT,GITHUB_ACTOR,IMAGE_OWNER
          script: |
            set -e

            # Authenticate with GHCR
            echo "$GHCR_PAT" | podman login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Pull the new image
            podman pull "ghcr.io/$IMAGE_OWNER/kidypath:latest"

            # Run database migrations before restarting the app
            podman run --rm \
              --env-file ~/kidypath/.env \
              --network=kidypath_default \
              "ghcr.io/$IMAGE_OWNER/kidypath:latest" \
              bun run db:migrate

            # Restart app with new image (no rebuild on server)
            cd ~/kidypath
            GHCR_IMAGE="ghcr.io/$IMAGE_OWNER/kidypath:latest" \
              podman-compose --env-file .env up -d --no-build --force-recreate app

            # Clean up old images (remove stopped containers first to release references)
            podman container prune -f || true
            podman image prune -f || true
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_OWNER: ${{ needs.build-and-push.outputs.owner }}
